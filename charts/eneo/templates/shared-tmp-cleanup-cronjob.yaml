{{- if .Values.sharedStorage.exportCleanup.enabled }}
apiVersion: batch/v1
kind: CronJob
metadata:
  name: {{ include "eneo.fullname" . }}-export-cleanup
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "eneo.labels" . | nindent 4 }}
    app.kubernetes.io/component: export-cleanup
spec:
  schedule: {{ .Values.sharedStorage.exportCleanup.schedule | quote }}
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      ttlSecondsAfterFinished: 86400
      template:
        metadata:
          labels:
            {{- include "eneo.selectorLabels" . | nindent 12 }}
            app.kubernetes.io/component: export-cleanup
        spec:
          restartPolicy: OnFailure
          containers:
            - name: cleanup
              image: busybox:latest
              command:
                - /bin/sh
                - -c
                - |
                  echo "Starting cleanup of export files older than {{ .Values.sharedStorage.exportCleanup.olderThanHours }} hours..."
                  find /app/exports -mindepth 1 -maxdepth 2 -type f -mmin +{{ mul .Values.sharedStorage.exportCleanup.olderThanHours 60 }} -delete
                  find /app/exports -mindepth 1 -maxdepth 1 -type d -empty -delete
                  echo "Cleanup complete."
              volumeMounts:
                - name: shared-data
                  mountPath: /app/exports
                  subPath: exports
              resources:
                requests:
                  cpu: 50m
                  memory: 64Mi
                limits:
                  cpu: 200m
                  memory: 128Mi
          volumes:
            - name: shared-data
              persistentVolumeClaim:
                claimName: {{ include "eneo.fullname" . }}-shared-data
{{- end }}
