{{- if .Values.sharedStorage.data.enabled }}
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "eneo.fullname" . }}-shared-data
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "eneo.labels" . | nindent 4 }}
  annotations:
    "helm.sh/resource-policy": keep
spec:
  accessModes:
    {{- toYaml .Values.sharedStorage.data.accessModes | nindent 4 }}
  {{- if .Values.global.testCluster }}
  storageClassName: nai-nfs-storage
  {{- else if .Values.sharedStorage.data.storageClass }}
  storageClassName: {{ .Values.sharedStorage.data.storageClass }}
  {{- end }}
  resources:
    requests:
      storage: {{ .Values.sharedStorage.data.size }}
{{- end }}
